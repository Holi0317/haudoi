name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  nodejs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Restore pnpm store cache
        uses: actions/cache@v6
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          # prettier-ignore
          key: "pnpm-store-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('pnpm-lock.yaml') }}"
          restore-keys: |
            pnpm-store-${{ runner.os }}-${{ runner.arch }}-
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore ESLint cache
        uses: actions/cache@v6
        with:
          path: .eslintcache
          key: eslint-cache-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            eslint-cache-${{ github.ref }}-
            eslint-cache-

      - name: Generate Cloudflare types
        run: pnpm run --filter @haudoi/worker cf-typegen

      - name: Check for worker-configuration.d.ts changes
        run: |
          if git diff --exit-code packages/worker/worker-configuration.d.ts; then
            echo "worker-configuration.d.ts is up to date"
          else
            echo "❌ worker-configuration.d.ts has uncommitted changes"
            echo "Please run 'pnpm run --filter @haudoi/worker cf-typegen' and commit the changes"
            exit 1
          fi

      - name: Run client build
        run: pnpm run --filter @haudoi/worker build-client

      - name: Check for client build changes
        run: |
          if git diff --exit-code packages/worker/src/client/build; then
            echo "Client build is up to date"
          else
            echo "❌ client build has uncommitted changes"
            echo "Please run 'pnpm run --filter @haudoi/worker build-client' and commit the changes"
            exit 1
          fi

      - name: Run ESLint
        run: pnpm lint

      - name: Check formatting with Prettier
        run: pnpm fmt --check

      - name: Typescript type check
        run: pnpm typecheck

      - name: Run unit tests
        run: pnpm test

  dart:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Restore Dart pub cache
        uses: actions/cache@v6
        with:
          path: ~/.pub-cache
          # prettier-ignore
          key: pub-cache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('mobile/pubspec.lock') }}
          restore-keys: |
            pub-cache-${{ runner.os }}-${{ runner.arch }}-
            pub-cache-${{ runner.os }}-

      - name: Get dependencies
        working-directory: mobile
        run: dart pub get

      - name: Run Dart analyzer
        working-directory: mobile
        run: dart analyze

      - name: Run custom analyzer
        working-directory: mobile
        run: dart run custom_lint

      - name: Run Dart formatter check
        working-directory: mobile
        run: dart format --output=none --set-exit-if-changed .

      - name: Run build_runner
        working-directory: mobile
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Check for generated file changes
        run: |
          if git diff --exit-code mobile/; then
            echo "Generated files are up to date"
          else
            echo "❌ Generated files have uncommitted changes"
            echo "Please run 'dart run build_runner build' in mobile/ directory and commit the changes"
            git diff mobile/
            exit 1
          fi
